services:
  - type: web
    name: music-diary-frontend
    runtime: static
    buildCommand: pnpm install && pnpm --filter @workspace/music-notebook run build
    staticPublishPath: artifacts/music-notebook/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: music-diary-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
